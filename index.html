<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>고급 텍스트 병합기 + 완성형 유틸리티 패키지</title>
<style>
:root {
    --primary: #0071e3;
    --primary-hover: #0077ed;
    --primary-light: #e8f2fc;
    --danger: #ff453a;
    --danger-hover: #ff554b;
    --success: #34c759;
    --warning: #ff9500;
    --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
    --panel-bg: rgba(255, 255, 255, 0.65);
    --panel-border: rgba(255, 255, 255, 0.4);
    --text-main: #1d1d1f;
    --text-muted: #86868b;
    --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03);
    --shadow-md: 0 8px 30px rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    min-height: 100vh;
    background: var(--bg-gradient);
    color: var(--text-main);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 30px 20px;
    -webkit-font-smoothing: antialiased;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

/* Header */
header {
    text-align: center;
    margin-bottom: 25px;
}
header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

/* Glassmorphism Card Base */
.glass-card {
    background: var(--panel-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--panel-border);
    border-radius: 18px;
    padding: 24px;
    box-shadow: var(--shadow-md);
    margin-bottom: 20px;
}

/* Dropzone Area */
.dropzone-area {
    border: 2px dashed rgba(0, 113, 227, 0.3);
    background: rgba(255, 255, 255, 0.4);
    padding: 40px 20px;
    border-radius: 14px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.dropzone-area:hover, .dropzone-area.dragover {
    border-color: var(--primary);
    background: rgba(0, 113, 227, 0.04);
    transform: scale(0.995);
}
.dropzone-area .icon {
    font-size: 40px;
    margin-bottom: 12px;
    display: block;
}
.dropzone-area p {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-main);
}
.dropzone-area span {
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 6px;
    display: block;
}

/* Control Header Row */
.control-header-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
}
.search-box {
    flex: 1;
    min-width: 250px;
}
.search-box input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    color: var(--text-main);
    outline: none;
    transition: all 0.2s;
}
.search-box input:focus {
    border-color: var(--primary);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
}

.sort-select-box select {
    padding: 12px 16px;
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.8);
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    outline: none;
    cursor: pointer;
}

/* Configuration Rows */
.config-row {
    display: flex;
    gap: 15px;
    align-items: center;
    padding: 10px 4px;
    margin-bottom: 5px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-main);
}
.config-row.bottom-border {
    border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    padding-bottom: 12px;
    margin-bottom: 12px;
}
.config-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}
.config-item input[type="radio"], .config-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
}

/* File List Window */
.file-window {
    background: rgba(255, 255, 255, 0.4);
    border: 1px solid rgba(0, 0, 0, 0.05);
    border-radius: 12px;
    max-height: 280px;
    overflow-y: auto;
}
.file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid rgba(0, 0, 0, 0.04);
    transition: background 0.2s;
}
.file-item:last-child { border-bottom: 0; }
.file-item:hover { background: rgba(255, 255, 255, 0.6); }
.file-info {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
}
.file-index {
    color: var(--text-muted);
    font-weight: 600;
    min-width: 20px;
}
.file-size-tag {
    font-size: 11px;
    color: var(--text-muted);
    background: rgba(0,0,0,0.04);
    padding: 2px 6px;
    border-radius: 6px;
}
.file-actions {
    display: flex;
    gap: 4px;
}

/* Buttons System */
.btn-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 20px;
}
button {
    font-size: 14px;
    font-weight: 600;
    padding: 12px 18px;
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none !important;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
.btn-secondary { background: rgba(0, 0, 0, 0.05); color: var(--text-main); }
.btn-secondary:hover:not(:disabled) { background: rgba(0, 0, 0, 0.1); transform: translateY(-1px); }
.btn-danger { background: rgba(255, 69, 58, 0.15); color: var(--danger); }
.btn-danger:hover:not(:disabled) { background: rgba(255, 69, 58, 0.25); color: var(--danger-hover); }

.btn-icon {
    padding: 6px 10px;
    border-radius: 8px;
    background: #fff;
    border: 1px solid rgba(0, 0, 0, 0.06);
    color: var(--text-main);
    font-size: 12px;
    box-shadow: var(--shadow-sm);
}
.btn-icon:hover { background: #fafafa; border-color: rgba(0,0,0,0.15); }

/* Progress Bar */
.progress-container {
    height: 8px;
    background: rgba(0, 0, 0, 0.05);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: var(--primary);
    border-radius: 10px;
    transition: width 0.2s ease;
}

/* Inspection & Report Panels */
.report-box { margin-bottom: 20px; }
.status-banner {
    padding: 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.5;
    margin-top: 10px;
}
.status-banner.success { background: rgba(52, 199, 89, 0.15); color: #1e7e34; border: 1px solid rgba(52, 199, 89, 0.2); }
.status-banner.warning { background: rgba(255, 149, 0, 0.15); color: #b36b00; border: 1px solid rgba(255, 149, 0, 0.2); }
.status-banner.danger { background: rgba(255, 69, 58, 0.12); color: #d32f2f; border: 1px solid rgba(255, 69, 58, 0.2); }

.report-summary {
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-muted);
    padding-left: 4px;
}

/* Textarea Preview */
.preview-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    margin-bottom: 8px;
    display: block;
}
textarea {
    width: 100%;
    height: 340px;
    background: #fff;
    color: var(--text-main);
    border: 1px solid rgba(0, 0, 0, 0.08);
    border-radius: 14px;
    padding: 16px;
    font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 13px;
    line-height: 1.6;
    outline: none;
    resize: vertical;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
    transition: border-color 0.2s;
}
textarea:focus { border-color: var(--primary); }

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.25); }
</style>
</head>
<body>

<div class="container">
    <header>
        <h1>📄 고급 텍스트 파일 병합기</h1>
    </header>

    <div class="glass-card">
        <div id="drop" class="dropzone-area">
            <span class="icon">📥</span>
            <p>파일을 이 영역에 드래그 앤 드롭하거나 클릭하여 선택하세요.</p>
            <span>지원 확장자: .txt, .html, .css, .js, .csv, .md, .json</span>
            <input id="files" type="file" multiple hidden>
        </div>
    </div>

    <div class="glass-card">
        <div class="control-header-row">
            <div class="search-box">
                <input id="search" placeholder="파일명으로 리스트 검색 및 필터링...">
            </div>
            <div class="sort-select-box">
                <select id="sortEngine">
                    <option value="none">정렬 방식 선택 (기본: 유저 순서)</option>
                    <option value="name-asc">이름 오름차순 (A-Z, 가-하)</option>
                    <option value="name-desc">이름 내림차순 (Z-A, 하-가)</option>
                    <option value="num-asc">파일명 포함 숫자 순</option>
                    <option value="size-desc">용량 큰 순</option>
                </select>
            </div>
        </div>

        <div class="config-row">
            <span>파일 간 구분 경계면 설정:</span>
            <label class="config-item"><input type="radio" name="separator" value="br" checked> 기본 줄바꿈 (\n\n)</label>
            <label class="config-item"><input type="radio" name="separator" value="dash"> 대시 구분선 (---)</label>
            <label class="config-item"><input type="radio" name="separator" value="name"> 파일명 주석 기입</label>
        </div>

        <div class="config-row bottom-border">
            <label class="config-item" title="웹소설 텍스트 추출 시 끊어진 가독성 문단을 자동 정렬 및 줄바꿈 복원합니다.">
                <input type="checkbox" id="novelMode"> 📖 웹소설 문단/줄바꿈 최적화 모드 활성화
            </label>
        </div>

        <div id="info" class="report-summary" style="margin-bottom: 10px; font-weight: 600;">파일 없음</div>
        <div id="list" class="file-window"></div>
    </div>

    <div class="btn-row">
        <button id="merge" class
